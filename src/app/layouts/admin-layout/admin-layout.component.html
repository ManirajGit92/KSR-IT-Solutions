<div class="flex h-screen bg-surface font-sans selection:bg-secondary-container selection:text-on-secondary-container transition-colors duration-300">
  <!-- Sidebar -->
  <aside class="hidden md:flex w-72 bg-surface-container-low border-r border-outline-variant/10 flex-col h-full relative overflow-hidden">
    <!-- Decorative Gradient -->
    <div class="absolute inset-0 bg-gradient-to-b from-primary/3 to-transparent pointer-events-none"></div>
    
    <div class="p-6 relative z-10">
      <a routerLink="/" class="text-2xl font-black tracking-tighter text-gradient flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-tertiary flex items-center justify-center text-white text-lg shadow-lg">K</div>
        <span>Admin</span>
      </a>
    </div>
    
    <nav class="flex-grow flex flex-col gap-1 px-4 mt-4 relative z-10 overflow-y-auto pb-6">
      <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant/50 px-4 mb-2 mt-4">Core</div>
      <a routerLink="/admin" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="LayoutDashboardIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> Dashboard
      </a>
      <a routerLink="/admin/sections" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="LayersIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> Section Builder
      </a>

      <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant/50 px-4 mb-2 mt-4">Academic</div>
      <a routerLink="/admin/courses" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="BookIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> Courses
      </a>
      <a routerLink="/admin/batches" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="CalendarIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> Batches
      </a>
      <a routerLink="/admin/trainers" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="UsersIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> Trainers
      </a>

      <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant/50 px-4 mb-2 mt-4">Students</div>
      <a routerLink="/admin/students" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="GraduationCapIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> Records
      </a>
      <a routerLink="/admin/enquiries" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="MessageSquareIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> Enquiries
      </a>
      <a routerLink="/admin/users" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="UsersIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> System Users
      </a>

      <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant/50 px-4 mb-2 mt-4">CMS</div>
      <a routerLink="/admin/testimonials" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="StarIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> Testimonials
      </a>
      <a routerLink="/admin/faqs" [routerLinkActive]="['bg-gradient-to-r', 'from-primary', 'to-primary-container', 'text-on-primary', 'shadow-md', 'shadow-primary/20']" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all font-semibold text-sm group">
        <lucide-icon [img]="HelpCircleIcon" class="w-4 h-4 group-hover:scale-110 transition-transform"></lucide-icon> FAQs
      </a>
    </nav>
    
    <div class="p-6 border-t border-outline-variant/10 relative z-10 bg-surface-container-low">
      <div class="flex items-center justify-between mb-4">
        <div class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Theme</div>
        <button (click)="themeService.toggleTheme()" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-surface-container-high text-primary transition-all">
          <lucide-icon [img]="themeService.getCurrentTheme() === 'dark' ? SunIcon : MoonIcon" class="w-4 h-4"></lucide-icon>
        </button>
      </div>
      <button (click)="firebaseService.logout()" class="flex items-center gap-2 text-sm font-bold text-error hover:opacity-80 transition-opacity w-full px-4 py-2.5 rounded-xl hover:bg-error/10">
        <lucide-icon [img]="LogOutIcon" class="w-4 h-4"></lucide-icon> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-grow flex flex-col h-full overflow-hidden bg-surface">
    <!-- Topbar Mobile -->
    <header class="md:hidden h-16 glass border-b border-outline-variant/10 flex items-center justify-between px-4 shrink-0">
      <a routerLink="/" class="font-black text-gradient flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-primary to-tertiary flex items-center justify-center text-white text-sm shadow-lg">K</div>
        Admin
      </a>
      <div class="flex items-center gap-2">
        <button (click)="themeService.toggleTheme()" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-surface-container-high text-primary transition-all">
          <lucide-icon [img]="themeService.getCurrentTheme() === 'dark' ? SunIcon : MoonIcon" class="w-4 h-4"></lucide-icon>
        </button>
        <button (click)="firebaseService.logout()" class="text-error">
          <lucide-icon [img]="LogOutIcon" class="w-4 h-4"></lucide-icon>
        </button>
      </div>
    </header>

    <!-- Mobile Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 glass border-t border-outline-variant/10 flex items-center justify-around py-2 overflow-x-auto whitespace-nowrap px-4 no-scrollbar">
      <a routerLink="/admin" [routerLinkActive]="['text-primary']" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center gap-1 text-on-surface-variant p-2">
        <lucide-icon [img]="LayoutDashboardIcon" class="w-5 h-5"></lucide-icon>
        <span class="text-[10px] font-bold">Dash</span>
      </a>
      <a routerLink="/admin/courses" [routerLinkActive]="['text-primary']" class="flex flex-col items-center gap-1 text-on-surface-variant p-2">
        <lucide-icon [img]="BookIcon" class="w-5 h-5"></lucide-icon>
        <span class="text-[10px] font-bold">Courses</span>
      </a>
      <a routerLink="/admin/enquiries" [routerLinkActive]="['text-primary']" class="flex flex-col items-center gap-1 text-on-surface-variant p-2">
        <lucide-icon [img]="MessageSquareIcon" class="w-5 h-5"></lucide-icon>
        <span class="text-[10px] font-bold">Enquiry</span>
      </a>
      <a routerLink="/admin/sections" [routerLinkActive]="['text-primary']" class="flex flex-col items-center gap-1 text-on-surface-variant p-2">
        <lucide-icon [img]="LayersIcon" class="w-5 h-5"></lucide-icon>
        <span class="text-[10px] font-bold">CMS</span>
      </a>
    </nav>

    <!-- Content Area -->
    <div class="flex-grow overflow-auto p-6 md:p-8 pb-20 md:pb-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
