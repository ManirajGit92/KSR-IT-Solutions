<div class="group relative bg-surface-container-lowest rounded-3xl overflow-hidden shadow-lg shadow-primary/5 flex flex-col transition-all duration-500 hover:-translate-y-3 hover:shadow-2xl hover:shadow-primary/15 h-full border border-outline-variant/10 hover:border-primary/20">
  <!-- Image -->
  <div class="h-48 sm:h-52 relative overflow-hidden">
    <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
         [src]="course.imageUrl" [alt]="course.title" referrerpolicy="no-referrer" loading="lazy"/>
    <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
    
    <div *ngIf="course.badge" class="absolute top-3 left-3 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg bg-gradient-to-r from-secondary to-yellow-500 text-white">
      {{ course.badge }}
    </div>

    <!-- Rating -->
    <div class="absolute top-3 right-3 glass px-2.5 py-1 rounded-lg flex items-center gap-1 border border-white/20">
      <lucide-icon [img]="StarIcon" class="w-3.5 h-3.5 fill-current text-yellow-400"></lucide-icon>
      <span class="text-[11px] font-bold text-white">{{ course.rating || '4.8' }}</span>
    </div>
  </div>

  <!-- Content -->
  <div class="p-6 sm:p-7 flex-grow flex flex-col">
    <h4 class="text-lg sm:text-xl font-black text-on-surface mb-2 group-hover:text-primary transition-colors leading-tight">{{ course.title }}</h4>
    <p class="text-sm text-on-surface-variant leading-relaxed mb-5 flex-grow font-medium line-clamp-2">{{ course.description }}</p>
    
    <!-- Meta -->
    <div class="flex flex-wrap items-center gap-2 mb-5">
      <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-surface-container text-[11px] font-bold text-on-surface-variant">
        <lucide-icon [img]="CalendarIcon" class="w-3 h-3 text-secondary"></lucide-icon> {{ course.duration }}
      </span>
      <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-surface-container text-[11px] font-bold text-on-surface-variant">
        <lucide-icon [img]="BarChartIcon" class="w-3 h-3 text-secondary"></lucide-icon> {{ course.level }}
      </span>
    </div>

    <!-- Price + CTA -->
    <div class="flex items-center justify-between pt-4 border-t border-outline-variant/15">
      <div>
        <span class="text-xl font-black text-on-surface">{{ course.price || '₹12,999' }}</span>
        <span *ngIf="course.originalPrice" class="text-xs line-through text-on-surface-variant ml-1.5">{{ course.originalPrice }}</span>
      </div>
      <button (click)="enroll.emit(course)"
              class="bg-gradient-to-r from-primary to-primary-container text-on-primary px-5 py-2.5 rounded-xl font-bold text-xs transition-all hover:shadow-lg hover:shadow-primary/20 active:scale-95">
        View Details →
      </button>
    </div>
  </div>
</div>
