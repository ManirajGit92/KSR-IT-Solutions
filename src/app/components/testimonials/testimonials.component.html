<section class="py-24 px-6 bg-surface-container-high overflow-hidden">
  <div class="max-w-7xl mx-auto">
    <h2 class="text-3xl font-bold text-primary mb-16 text-center">Student Success Stories</h2>
    <div class="relative max-w-3xl mx-auto">
      <div *ngFor="let t of testimonials" class="bg-surface-container-lowest p-10 rounded-3xl shadow-xl relative z-10 border border-outline-variant/10">
        <div class="flex gap-1 text-secondary mb-8">
          <lucide-icon [img]="StarIcon" *ngFor="let _ of getRatingArray(t.rating)" class="w-5 h-5 fill-current text-secondary"></lucide-icon>
        </div>
        <p class="text-on-surface-variant text-lg leading-relaxed mb-10 italic">"{{ t.content }}"</p>
        <div class="flex items-center gap-5">
          <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-secondary/20">
            <img class="w-full h-full object-cover" [src]="t.imageUrl" [alt]="t.name" referrerpolicy="no-referrer" />
          </div>
          <div>
            <div class="font-bold text-primary text-lg">{{ t.name }}</div>
            <div class="text-xs text-on-surface-variant font-medium">{{ t.role }}</div>
          </div>
        </div>
      </div>
      <div class="absolute -bottom-4 left-8 right-8 h-20 bg-surface-container-lowest/50 rounded-3xl -z-10 translate-y-2"></div>
    </div>
  </div>
</section>
