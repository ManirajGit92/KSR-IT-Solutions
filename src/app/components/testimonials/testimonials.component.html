<section class="py-24 px-6 bg-surface-container-high relative overflow-hidden">
  <!-- Decorative -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/4 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
  </div>

  <div class="max-w-7xl mx-auto relative z-10">
    <!-- Section Header -->
    <div class="text-center mb-16 animate-fade-in-up">
      <span class="text-xs font-bold uppercase tracking-[0.2em] text-secondary mb-4 block">Testimonials</span>
      <h2 class="text-4xl md:text-5xl font-black text-on-surface tracking-tight mb-4">
        Student <span class="text-gradient">Success Stories</span>
      </h2>
      <p class="text-on-surface-variant text-lg max-w-xl mx-auto font-medium">
        Real experiences from real students who transformed their careers with us.
      </p>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-16">
      <div *ngFor="let stat of stats" class="glass rounded-2xl p-6 text-center border border-outline-variant/10 hover:border-primary/20 transition-all duration-300 hover:-translate-y-1">
        <div class="text-3xl md:text-4xl font-black text-gradient mb-2">{{ stat.value }}</div>
        <div class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">{{ stat.label }}</div>
      </div>
    </div>

    <!-- Testimonials Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let t of testimonials; let i = index" 
           class="group glass p-8 rounded-3xl border border-outline-variant/10 hover:border-primary/20 transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl animate-fade-in-up relative overflow-hidden"
           [style.animation-delay]="i * 150 + 'ms'">
        
        <div class="absolute inset-0 bg-gradient-to-br from-primary/3 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
        
        <div class="relative z-10">
          <!-- Quote icon -->
          <svg class="w-10 h-10 text-primary/20 mb-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/>
          </svg>

          <!-- Stars -->
          <div class="flex gap-1 mb-6">
            <lucide-icon [img]="StarIcon" *ngFor="let _ of getRatingArray(t.rating)" class="w-4 h-4 fill-current text-yellow-500"></lucide-icon>
          </div>
          
          <p class="text-on-surface text-base leading-relaxed mb-8 font-medium">"{{ t.content }}"</p>
          
          <!-- Author -->
          <div class="flex items-center gap-4 pt-6 border-t border-outline-variant/20">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-primary/20 shadow-sm">
              <img class="w-full h-full object-cover" [src]="t.imageUrl" [alt]="t.name" referrerpolicy="no-referrer" />
            </div>
            <div>
              <div class="font-bold text-on-surface text-sm">{{ t.name }}</div>
              <div class="text-xs text-on-surface-variant font-medium">{{ t.role }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
