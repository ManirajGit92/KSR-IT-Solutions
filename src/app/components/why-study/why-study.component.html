<section id="why-us" class="py-20 md:py-28 px-6 bg-surface relative overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute -top-32 -right-32 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
  </div>

  <div class="max-w-7xl mx-auto relative z-10">
    <div class="text-center mb-14 md:mb-20 animate-fade-in-up">
      <span class="text-xs font-bold uppercase tracking-[0.2em] text-secondary mb-4 block">The KSR Advantage</span>
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-black text-on-surface tracking-tight mb-4">Why Choose <span class="text-gradient">Us?</span></h2>
      <p class="text-on-surface-variant text-base sm:text-lg max-w-2xl mx-auto font-medium">Everything you need to transition into a high-paying tech career, all in one place.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let benefit of benefits; let i = index" 
           class="group relative glass p-7 sm:p-8 rounded-3xl border border-outline-variant/15 hover:border-primary/30 transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl overflow-hidden animate-fade-in-up"
           [style.animation-delay]="i * 120 + 'ms'">
        
        <div class="absolute inset-0 bg-gradient-to-br from-white/40 to-transparent dark:from-white/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
        
        <div class="relative z-10 flex flex-col h-full">
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-7 transition-all duration-500 group-hover:scale-110 group-hover:rotate-3 shadow-sm" [ngClass]="benefit.color">
            <lucide-icon [img]="benefit.icon" class="w-7 h-7"></lucide-icon>
          </div>
          
          <h4 class="font-bold text-on-surface text-xl sm:text-2xl mb-3 group-hover:text-primary transition-colors">{{ benefit.title }}</h4>
          <p class="text-on-surface-variant leading-relaxed flex-grow font-medium text-sm sm:text-base">{{ benefit.desc }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
