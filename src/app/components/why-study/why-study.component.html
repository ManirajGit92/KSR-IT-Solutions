<section class="py-24 px-6 bg-surface-container-low">
  <div class="max-w-7xl mx-auto">
    <h2 class="text-3xl font-bold text-primary mb-16 text-center">Why Study at KSR?</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
      <div *ngFor="let benefit of benefits" class="flex flex-col items-center text-center">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-6" [ngClass]="benefit.color">
          <lucide-icon [img]="benefit.icon" class="w-8 h-8"></lucide-icon>
        </div>
        <h4 class="font-bold text-primary text-xl mb-3">{{ benefit.title }}</h4>
        <p class="text-sm text-on-surface-variant leading-relaxed">{{ benefit.desc }}</p>
      </div>
    </div>
  </div>
</section>
