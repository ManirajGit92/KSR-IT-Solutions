<section id="courses" class="py-24 px-6 bg-surface-container-low relative overflow-hidden">
  <!-- Decorative -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
    <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-tertiary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="max-w-7xl mx-auto relative z-10">
    <!-- Section Header -->
    <div class="text-center mb-16 animate-fade-in-up">
      <span class="text-xs font-bold uppercase tracking-[0.2em] text-secondary mb-4 block">Our Programs</span>
      <h2 class="text-4xl md:text-5xl font-black text-on-surface tracking-tight mb-4">
        Featured <span class="text-gradient">Courses</span>
      </h2>
      <p class="text-on-surface-variant text-lg max-w-2xl mx-auto font-medium">
        Industry-recognized programs designed by experts to launch your career in tech.
      </p>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="flex flex-col items-center justify-center py-20 gap-4">
      <div class="relative">
        <div class="w-16 h-16 border-4 border-surface-container-high rounded-full"></div>
        <div class="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin absolute inset-0"></div>
      </div>
      <p class="text-on-surface-variant text-sm font-medium">Loading courses...</p>
    </div>

    <!-- Course Grid -->
    <div *ngIf="!loading && courses.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let course of courses; let i = index" 
           class="animate-fade-in-up"
           [style.animation-delay]="i * 150 + 'ms'">
        <app-course-card [course]="course" (enroll)="handleEnroll($event)"></app-course-card>
      </div>
    </div>

  </div>
</section>
