<section class="py-20 md:py-28 px-6 bg-surface relative overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/3 right-0 w-72 h-72 bg-primary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="max-w-5xl mx-auto relative z-10">
    <div class="text-center mb-14 md:mb-20 animate-fade-in-up">
      <span class="text-xs font-bold uppercase tracking-[0.2em] text-secondary mb-4 block">How It Works</span>
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-black text-on-surface tracking-tight mb-4">Your Learning <span class="text-gradient">Journey</span></h2>
      <p class="text-on-surface-variant text-base sm:text-lg max-w-xl mx-auto font-medium">From enrollment to placement — a structured 5-step process to launch your career.</p>
    </div>

    <!-- Timeline -->
    <div class="relative">
      <!-- Vertical line (desktop) -->
      <div class="hidden md:block absolute left-1/2 top-0 bottom-0 w-px bg-gradient-to-b from-primary/30 via-secondary/30 to-tertiary/30 -translate-x-1/2"></div>
      
      <div *ngFor="let step of steps; let i = index"
           class="relative flex flex-col items-center gap-6 mb-12 last:mb-0 animate-fade-in-up"
           [style.animation-delay]="i * 150 + 'ms'">
        
        <div class="flex flex-col md:flex-row items-center gap-6 md:gap-12 w-full"
             [ngClass]="i % 2 === 1 ? 'md:flex-row-reverse' : ''">
          
          <!-- Content Card -->
          <div class="flex-1 w-full" [ngClass]="i % 2 === 0 ? 'md:text-right' : ''">
            <div class="group glass p-6 sm:p-7 rounded-2xl border border-outline-variant/15 hover:border-primary/20 transition-all duration-500 hover:-translate-y-1 hover:shadow-xl">
              <h4 class="text-lg sm:text-xl font-bold text-on-surface mb-2 group-hover:text-primary transition-colors">{{ step.title }}</h4>
              <p class="text-sm text-on-surface-variant font-medium leading-relaxed">{{ step.desc }}</p>
            </div>
          </div>
          
          <!-- Center Dot -->
          <div class="flex-shrink-0 w-14 h-14 rounded-2xl bg-gradient-to-br flex items-center justify-center text-white shadow-lg z-10 relative"
               [ngClass]="step.color">
            <lucide-icon [img]="step.icon" class="w-6 h-6"></lucide-icon>
            <span class="absolute -top-2 -right-2 w-6 h-6 bg-background border-2 border-outline-variant/30 rounded-full text-[10px] font-black text-on-surface flex items-center justify-center">{{ i + 1 }}</span>
          </div>
          
          <!-- Spacer -->
          <div class="flex-1 hidden md:block"></div>
        </div>
      </div>
    </div>
  </div>
</section>
