<section class="py-24 px-6 bg-surface relative overflow-hidden">
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="max-w-7xl mx-auto relative z-10">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-6 mb-16">
      <div class="animate-fade-in-up">
        <span class="text-xs font-bold uppercase tracking-[0.2em] text-secondary mb-4 block">Core Competencies</span>
        <h3 class="text-4xl md:text-5xl font-black text-on-surface tracking-tight">Master the Modern <br/><span class="text-gradient">Data Stack</span></h3>
      </div>
      <p class="text-on-surface-variant font-medium max-w-md animate-fade-in animation-delay-500">
        Our curriculum covers the most in-demand technologies that top companies are hiring for right now.
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let item of items; let i = index"
           class="group relative glass p-8 rounded-2xl border border-outline-variant/10 hover:border-primary/30 transition-all duration-500 hover:-translate-y-2 hover:shadow-xl overflow-hidden animate-fade-in-up"
           [style.animation-delay]="i * 100 + 'ms'">
        
        <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
        
        <div class="relative z-10">
          <div class="w-14 h-14 rounded-2xl bg-surface-container flex items-center justify-center mb-6 text-primary group-hover:bg-gradient-to-br group-hover:from-primary group-hover:to-secondary group-hover:text-white transition-all duration-500 shadow-sm group-hover:shadow-lg group-hover:scale-110">
            <lucide-icon [img]="item.icon" class="w-6 h-6"></lucide-icon>
          </div>
          <h4 class="font-bold text-xl text-on-surface mb-3 group-hover:text-primary transition-colors">{{ item.title }}</h4>
          <p class="text-sm text-on-surface-variant leading-relaxed font-medium">{{ item.desc }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
