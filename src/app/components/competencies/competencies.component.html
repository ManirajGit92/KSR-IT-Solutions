<section class="py-20 px-6 max-w-7xl mx-auto">
  <div class="mb-12">
    <h2 class="text-xs font-black uppercase tracking-widest text-secondary mb-2">Core Competencies</h2>
    <h3 class="text-3xl font-bold text-primary leading-tight">Master Modern Data Stack</h3>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let item of items"
         class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm border border-outline-variant/10 group transition-all hover:-translate-y-1">
      <div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center mb-6 text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
        <lucide-icon [img]="item.icon" class="w-6 h-6"></lucide-icon>
      </div>
      <h4 class="font-bold text-lg text-primary mb-2">{{ item.title }}</h4>
      <p class="text-sm text-on-surface-variant leading-relaxed">{{ item.desc }}</p>
    </div>
  </div>
</section>
